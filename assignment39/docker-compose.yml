version: "3.8"

services:
  mongo:
    image: mongo:6
    container_name: mongo_db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secret
    volumes:
      - mongo_data:/data/db
    networks:
      - backend_network

  backend:
    build: ./backend
    container_name: node_backend
    environment:
      MONGO_URI: mongodb://admin:secret@mongo:27017/appdb?authSource=admin
    depends_on:
      - mongo
    networks:
      - backend_network
      - frontend_network

  frontend:
    build: ./frontend
    container_name: react_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - frontend_network

networks:
  backend_network:
    driver: bridge
  frontend_network:
    driver: bridge

volumes:
  mongo_data:
